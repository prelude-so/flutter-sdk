name: Auto-tag and publish on version change
on:
  push:
    branches:
      - main

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag_created: ${{ steps.check_tag.outputs.tag_created }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read version from pubspec.yaml
        id: read_version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check_tag
        run: |
          TAG="v${{ steps.read_version.outputs.VERSION }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "tag_created=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag_created=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.check_tag.outputs.tag_created == 'true'
        env:
          TAG: v${{ steps.read_version.outputs.VERSION }}
        run: |
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

  publish:
    needs: auto-tag
    if: needs.auto-tag.outputs.tag_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for OIDC authentication with pub.dev
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub publish --dry-run
      - run: flutter pub publish --force
